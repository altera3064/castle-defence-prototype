<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Castle Defence Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="게임 상태">
        <div class="brand">
          <strong>Castle Defence</strong>
          <span id="readout">선택: 없음</span>
        </div>
        <div class="stats">
          <button id="startWave" class="primary-action top-action">웨이브 시작</button>
          <span id="core">Core 100%</span>
          <span id="wave">Wave 1</span>
          <span id="gold">Gold 0</span>
          <span id="enemies">Enemies 0</span>
        </div>
      </section>

      <section class="stage" aria-label="게임 화면">
        <div class="game-surface">
          <canvas id="game" width="1056" height="672"></canvas>
          <div id="gameOverOverlay" class="game-over-overlay" role="alertdialog" aria-modal="true" aria-labelledby="gameOverTitle" hidden>
            <div class="game-over-panel">
              <span>CASTLE FALLEN</span>
              <h1 id="gameOverTitle">임무 실패</h1>
              <p>코어가 파괴되었습니다.</p>
              <button id="retryGame" class="retry-button" type="button">Retry</button>
            </div>
          </div>
        </div>
      </section>

      <section class="commandbar" aria-label="명령 패널">
        <div class="control-strip">
          <div class="mode-tabs" role="tablist" aria-label="명령 모드">
            <button id="buildMode" class="mode-tab active" type="button">건설</button>
            <button id="productionMode" class="mode-tab" type="button">생산</button>
            <button id="upgradeMode" class="mode-tab" type="button">강화</button>
          </div>

          <div class="hero-row" aria-label="영웅 필살기">
            <span>필살기</span>
            <button id="meteor">메테오</button>
            <button id="knockback">넉백</button>
          </div>
        </div>

        <div class="command-row mode-panel build-panel active" id="buildPanel">
          <button data-tool="wall" class="active">성벽 5G</button>
          <button data-tool="tower">화살탑 35G</button>
          <button data-tool="meleeBarracks">근접 병영 30G</button>
          <button data-tool="archerBarracks">궁수 병영 30G</button>
          <button data-tool="catapultWorkshop">투석기 제작소 30G</button>
          <button data-tool="erase">철거</button>
        </div>

        <div class="command-row mode-panel production-panel" id="productionPanel" hidden>
          <button id="recruitMelee">근접병 1명 10G</button>
          <button id="recruitArcher">궁수 1명 15G</button>
          <button id="recruitCatapult">투석기 1대 80G</button>
        </div>

        <div class="command-row mode-panel upgrade-panel" id="upgradePanel" hidden>
          <button id="upgradeTowers">타워 강화</button>
          <button id="upgradeWalls">성벽 강화</button>
          <button id="upgradeSoldiers" hidden>병사 강화</button>
        </div>

        <div class="status" id="status">건설 후 웨이브를 시작하세요.</div>
      </section>
    </main>

    <script src="src/game.js?v=wall-tile-individual"></script>
  </body>
</html>
